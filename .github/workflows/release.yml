# PRD-028 8-job release pipeline for `shieldops-sdk`.
#
# Authored in the private monorepo at sdk/.github/workflows/release.yml;
# rides the carve-out mirror to shieldops-io/shieldops-sdk on every
# release (PR D rehearsal lesson). This is the ONLY workflow that exists
# across both repos per Option B.
#
# Triggers:
#   sdk-vX.Y.Z       → production: publishes to pypi.org
#   sdk-vX.Y.Z-rcN   → rehearsal:  publishes to test.pypi.org
#
# Manual approval (production only): the `pypi` environment requires
# @ghantakiran sign-off on the first 5 releases (PRD-028 §Phase 7).
#
# OPERATOR NOTE — tag-push dedup quirk: the WARP mirror force-pushes
# main:main FIRST then refs/tags/<tag> at the same SHA. GitHub sometimes
# deduplicates the tag-push event when it lands on a SHA that just got
# a main-push event for the same workflow file, and the workflow then
# never fires for the tag. Workaround: ensure each tag points at a SHA
# not previously seen on main (a no-op churn commit on a comment is
# enough). The dependency on this is fragile; tracking #675 for a
# proper mirror-side fix (push tag-only with no preceding main push, or
# push tag BEFORE main).
#
# See docs/internal/SDK_RELEASE_YML_OUTLINE.md (private monorepo) for the
# design notes and the source-of-truth list of jobs + secrets.

name: release

on:
  push:
    tags:
      - "sdk-v[0-9]+.[0-9]+.[0-9]+"
      - "sdk-v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  # Manual escape hatch: GitHub occasionally drops tag-push events when
  # the tag lands on a SHA that already has a main-push event (observed
  # silently swallowing sdk-v0.1.1-rc4 and rc5 — tags on remote, no run).
  # workflow_dispatch lets the operator (and only the operator — public
  # repo has no Contributors) invoke the pipeline against an arbitrary
  # ref via the Actions tab or `gh workflow run release.yml --ref <tag>`.
  workflow_dispatch:
    inputs:
      ref_to_run:
        description: "Tag or commit SHA to release from (for status display only; pipeline resolves the version from the actual git ref)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. prepare ───────────────────────────────────────────────────────
  prepare:
    name: prepare (resolve version + validate CHANGELOG)
    runs-on: ubuntu-latest
    outputs:
      sdk_version: ${{ steps.resolve.outputs.sdk_version }}
      is_rc: ${{ steps.resolve.outputs.is_rc }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve SDK_VERSION from tag
        id: resolve
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip "sdk-v" prefix, leaving X.Y.Z[-rcN].
          VER="${TAG#sdk-v}"
          IS_RC="false"
          if [[ "${VER}" == *"-rc"* ]]; then
            IS_RC="true"
          fi
          echo "sdk_version=${VER}" >> "${GITHUB_OUTPUT}"
          echo "is_rc=${IS_RC}" >> "${GITHUB_OUTPUT}"
          echo "Resolved: ${VER} (rc=${IS_RC})"

      - name: Validate CHANGELOG has a dated section for this version
        if: steps.resolve.outputs.is_rc == 'false'
        run: |
          VER="${{ steps.resolve.outputs.sdk_version }}"
          python3 - <<PY
          import re, sys, pathlib
          body = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pat = re.compile(rf"^## \[{re.escape('${VER}')}\]\s+-\s+\d{{4}}-\d{{2}}-\d{{2}}", re.M)
          if not pat.search(body):
              print(f"CHANGELOG.md missing dated section for [${VER}]", file=sys.stderr)
              sys.exit(1)
          print(f"CHANGELOG OK for [${VER}]")
          PY

  # ── 2. lint-and-type ────────────────────────────────────────────────
  lint-and-type:
    name: lint + type
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy
        run: mypy src/shieldops_sdk/

  # ── 3. test ──────────────────────────────────────────────────────────
  test:
    name: test
    needs: prepare
    runs-on: ubuntu-latest
    # Sigstore staging round-trip (tests/integration/sigstore/) needs the
    # workflow's OIDC token to sign against fulcio.sigstage.dev.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev deps + sigstore (for staging round-trip)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "sigstore>=3.0"
      - name: Pytest (unit + sigstore staging)
        run: pytest tests/ -v --tb=short

  # ── 4. build ─────────────────────────────────────────────────────────
  build:
    name: build (sdist + wheel)
    needs: [lint-and-type, test]
    runs-on: ubuntu-latest
    outputs:
      sdist_sha256: ${{ steps.digest.outputs.sdist_sha256 }}
      wheel_sha256: ${{ steps.digest.outputs.wheel_sha256 }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch
      - name: Build distributions
        run: hatch build -t sdist -t wheel
      - name: Capture artifact digests
        id: digest
        run: |
          SDIST=$(ls dist/*.tar.gz)
          WHEEL=$(ls dist/*.whl)
          echo "sdist_sha256=$(sha256sum ${SDIST} | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"
          echo "wheel_sha256=$(sha256sum ${WHEEL} | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── 5. sbom ──────────────────────────────────────────────────────────
  sbom:
    name: CycloneDX SBOM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install cyclonedx-py
        run: pip install cyclonedx-bom
      - name: Generate SBOM
        run: |
          cyclonedx-py environment --of JSON --output-file sbom.cdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json

  # ── 6. provenance (SLSA L3 via reusable workflow) ────────────────────
  provenance:
    name: SLSA L3 provenance
    needs: build
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.sdist_sha256 }} ${{ needs.build.outputs.wheel_sha256 }}
      # SLSA's reusable workflow `final` job hard-fails when upload-assets is
      # false (its SUCCESS output comes from the upload-assets outcome). The
      # working combo is upload-assets=true + draft-release=true: SLSA creates
      # a draft GitHub Release for the triggering tag if one doesn't exist
      # yet and attaches the .intoto.jsonl. Step 8 of the playbook then
      # promotes the draft via `gh release edit --draft=false`.
      upload-assets: true
      draft-release: true

  # ── 7. publish (PyPI Trusted Publishing) ─────────────────────────────
  publish:
    name: publish to ${{ needs.prepare.outputs.is_rc == 'true' && 'TestPyPI' || 'PyPI' }}
    # NOTE: provenance is intentionally NOT in `needs`. slsa-github-generator
    # v2.0.0+v2.1.0 both have a buggy `final` reporter job that hard-fails
    # with SUCCESS=false even when upload-assets succeeds and the .intoto.jsonl
    # is correctly attached to the draft Release. Keeping it in `needs` would
    # cascade the cosmetic failure and skip publish. We still wait for
    # `build` (we publish those artifacts) and `sbom` (so the SBOM job
    # finishes before publish starts).
    needs: [prepare, build, sbom]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.is_rc == 'true' && 'testpypi' || 'pypi' }}
      url: ${{ needs.prepare.outputs.is_rc == 'true' && 'https://test.pypi.org/p/shieldops-sdk' || 'https://pypi.org/p/shieldops-sdk' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish (TestPyPI for rc tags)
        if: needs.prepare.outputs.is_rc == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Re-running an RC at the same version (e.g. when iterating on
          # release.yml itself) must not fail because TestPyPI already has
          # the wheel. Production publish below intentionally omits this —
          # a duplicate upload there is an error condition.
          skip-existing: true
      - name: Publish (PyPI for release tags)
        if: needs.prepare.outputs.is_rc == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 8. verify-published ──────────────────────────────────────────────
  verify-published:
    name: verify pip install + import + signature snapshot
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: pip install in a fresh venv (with poll + retry)
        # PyPI/TestPyPI return 200 OK on upload but the /simple/ index pip
        # consults updates asynchronously across HTML (PEP 503) and JSON
        # (PEP 691) endpoints independently — CDN edges for the two APIs
        # can lag each other. Previous attempts (fixed sleep, HTML-only
        # poll) raced the JSON cache. The robust approach is to retry the
        # actual install (the thing we want to verify), with --no-cache-dir
        # to bypass any local pip HTTP cache, up to 6 tries × 20s ≈ 2 min.
        run: |
          # The published wheel uses pyproject.toml's version, which is the
          # release version *without* the -rcN suffix. prepare.sdk_version
          # carries the suffix (we use it for is_rc routing); strip it for
          # the install pin. Confirmed in rc7: TestPyPI accepted the upload
          # as `shieldops-sdk==0.1.0`, not `0.1.0-rc7`.
          PKG_VERSION="${{ needs.prepare.outputs.sdk_version }}"
          PKG_VERSION="${PKG_VERSION%-rc*}"
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install --upgrade pip

          if [[ "${{ needs.prepare.outputs.is_rc }}" == "true" ]]; then
            INSTALL_ARGS=(
              --no-cache-dir
              --index-url https://test.pypi.org/simple/
              --extra-index-url https://pypi.org/simple/
              "shieldops-sdk==${PKG_VERSION}"
            )
          else
            INSTALL_ARGS=(
              --no-cache-dir
              "shieldops-sdk==${PKG_VERSION}"
            )
          fi

          for attempt in $(seq 1 6); do
            echo "Attempt ${attempt}/6: pip install ${INSTALL_ARGS[*]}"
            if /tmp/verify/bin/pip install "${INSTALL_ARGS[@]}"; then
              echo "pip install succeeded on attempt ${attempt}."
              exit 0
            fi
            if [[ ${attempt} -lt 6 ]]; then
              echo "Install failed — likely simple-index propagation; sleeping 20s and retrying."
              sleep 20
            fi
          done
          echo "::error::pip install shieldops-sdk==${PKG_VERSION} failed after 6 retries." >&2
          exit 1
      - name: Import smoke test
        # ShieldOpsInterceptor requires a ShieldOpsConfig; defaults are all
        # safe (LOCAL telemetry, empty api_key → no network calls).
        run: |
          /tmp/verify/bin/python -c "from shieldops_sdk import ShieldOpsInterceptor, ShieldOpsConfig; ShieldOpsInterceptor(ShieldOpsConfig())"
